<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Algoritmos de Busca</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        input[type="file"],
        input[type="text"],
        textarea,
        select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            min-height: 150px;
            resize: vertical;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
        }

        .btn-secondary:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .results-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .result-card {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .result-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .result-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            font-weight: 600;
            color: #4a5568;
        }

        .metric-value {
            color: #667eea;
            font-weight: 700;
        }

        .matches {
            background: #c6f6d5;
            color: #22543d;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 13px;
        }

        .steps-container {
            background: #edf2f7;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .step {
            background: white;
            padding: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            border-radius: 3px;
            font-size: 13px;
        }

        .step.match {
            border-left-color: #48bb78;
            background: #f0fff4;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-weight: 600;
        }

        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Comparador de Algoritmos de Busca em Strings</h1>

        <div class="input-section">
            <div class="form-group">
                <label for="fileInput">Carregar arquivo .txt</label>
                <input type="file" id="fileInput" accept=".txt">
            </div>

            <div class="form-group">
                <label for="textInput">Ou cole o texto aqui</label>
                <textarea id="textInput" placeholder="Digite ou cole o texto..."></textarea>
            </div>

            <div class="form-group">
                <label for="patternInput">Padrão a buscar</label>
                <input type="text" id="patternInput" placeholder="Digite a string a buscar...">
            </div>

            <div class="form-group">
                <label for="algorithmSelect">Algoritmo</label>
                <select id="algorithmSelect">
                    <option value="all">Todos os algoritmos</option>
                    <option value="naive">Naive Search</option>
                    <option value="rabin_karp">Rabin-Karp</option>
                    <option value="kmp">KMP</option>
                    <option value="boyer_moore">Boyer-Moore</option>
                </select>
            </div>
        </div>

        <div class="controls">
            <button class="btn-primary" onclick="executeSearch()">Executar Busca</button>
            <button class="btn-secondary" onclick="executeStepByStep()">Passo a Passo</button>
            <div class="checkbox-group">
                <input type="checkbox" id="stepByStepCheckbox">
                <label for="stepByStepCheckbox" style="margin: 0;">Modo Debug</label>
            </div>
        </div>

        <div id="errorContainer"></div>
        <div id="loadingContainer"></div>
        <div id="resultsContainer" class="results-section"></div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const textInput = document.getElementById('textInput');
        const patternInput = document.getElementById('patternInput');
        const errorContainer = document.getElementById('errorContainer');
        const loadingContainer = document.getElementById('loadingContainer');
        const resultsContainer = document.getElementById('resultsContainer');

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (response.ok) {
                    textInput.value = data.content;
                    showError('', false);
                } else {
                    showError(data.error, true);
                }
            } catch (error) {
                showError('Erro ao carregar arquivo: ' + error.message, true);
            }
        });

        function showError(message, isError) {
            if (message) {
                errorContainer.innerHTML = `<div class="error">${message}</div>`;
            } else {
                errorContainer.innerHTML = '';
            }
        }

        function showLoading(show) {
            if (show) {
                loadingContainer.innerHTML = '<div class="loading">⏳ Processando...</div>';
            } else {
                loadingContainer.innerHTML = '';
            }
        }

        async function executeSearch() {
            const text = textInput.value.trim();
            const pattern = patternInput.value.trim();

            if (!text || !pattern) {
                showError('Por favor, preencha o texto e o padrão', true);
                return;
            }

            showLoading(true);
            showError('', false);

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: text,
                        pattern: pattern,
                        step_by_step: false
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    displayResults(data.results, data.comparison);
                } else {
                    showError(data.error, true);
                }
            } catch (error) {
                showError('Erro na busca: ' + error.message, true);
            } finally {
                showLoading(false);
            }
        }

        async function executeStepByStep() {
            const text = textInput.value.trim();
            const pattern = patternInput.value.trim();

            if (!text || !pattern) {
                showError('Por favor, preencha o texto e o padrão', true);
                return;
            }

            showLoading(true);
            showError('', false);

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: text,
                        pattern: pattern,
                        step_by_step: true
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    displayResults(data.results, data.comparison, true);
                } else {
                    showError(data.error, true);
                }
            } catch (error) {
                showError('Erro na busca: ' + error.message, true);
            } finally {
                showLoading(false);
            }
        }

        function displayResults(results, comparison, showSteps = false) {
            resultsContainer.innerHTML = '';

            results.forEach(result => {
                const card = document.createElement('div');
                card.className = 'result-card';

                let html = `
                    <h3>${result.algorithm}</h3>
                    <div class="metric">
                        <span class="metric-label">Complexidade:</span>
                        <span class="metric-value">${result.complexity}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Tempo:</span>
                        <span class="metric-value">${result.time_ms.toFixed(4)} ms</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Comparações:</span>
                        <span class="metric-value">${result.comparisons}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Ocorrências:</span>
                        <span class="metric-value">${result.matches.length}</span>
                    </div>
                `;

                if (result.matches.length > 0) {
                    html += `<div class="matches">Encontrado em: ${result.matches.join(', ')}</div>`;
                }

                if (result.lps_table) {
                    html += `<div class="matches">Tabela LPS: [${result.lps_table.join(', ')}]</div>`;
                }

                if (result.bad_char_table && Object.keys(result.bad_char_table).length > 0) {
                    const tableStr = Object.entries(result.bad_char_table)
                        .map(([k, v]) => `'${k}': ${v}`)
                        .join(', ');
                    html += `<div class="matches">Bad Char Table: {${tableStr}}</div>`;
                }

                if (showSteps && result.steps.length > 0) {
                    html += '<div class="steps-container">';
                    result.steps.forEach((step, idx) => {
                        const stepClass = step.action.includes('ENCONTRADO') ? 'step match' : 'step';
                        html += `<div class="${stepClass}"><strong>Passo ${idx + 1}:</strong> ${JSON.stringify(step)}</div>`;
                    });
                    html += '</div>';
                }

                card.innerHTML = html;
                resultsContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
